<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Timeout Page</title>
    <script>
        // Set a timeout for 5 seconds (5000 milliseconds)
        setTimeout(function() {
            // Redirect to another page or perform an action
            alert("Your session has timed out!");
            window.location.href = "login.html"; 
        }, 5000);
    </script>
</head>
<body>
    <h1>Waiting...</h1>
    <p>You will be redirected to the login page after 5 seconds.</p>
</body>
</html>
