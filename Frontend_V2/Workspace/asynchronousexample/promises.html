<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function download(url) {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    // Append text instead of overwriting the document
                    document.body.innerHTML += `Downloading ${url} ...<br>`;
                    // Simulating successful download - resolve with the URL itself
                    resolve(url); 
                }, 1000);
            });
        }

        function process(pictureUrl) {
            // Append text instead of overwriting the document
            document.body.innerHTML += `Processing ${pictureUrl}<br>`;
        }

        let url = 'https://images.pexels.com/photos/133472/pexels-photo-133472.jpeg?auto=compress&cs=tinysrgb&w=600';

        download(url)
            .then(process)
            .catch(error => document.body.innerHTML += `Error: ${error}<br>`);

    </script>
</body>
</html>
